<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Radio Phoenix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="radio-container">
        <h3 id="title">Radio Phoenix</h3>
        <div id="media">
            <div class="now-playing-art">
                <img class="album_art" src="https://radio.nerdyjohnny.com/api/station/radio_phoenix/art/5395b525da49543534e9f950" 
                loading="lazy" alt="">
            </div>
            <div class="now-playing-main">
                <div>
                    <h4 class="now-playing-title"></h4>
                    <h5 class="now-playing-artist"></h5>
                </div>
                <div class="time-display">
                    <div class="time-display-played text-secondary"></div>
                    <div class="time-display-progress">
                        <div class="progress h-5">
                            <div class="progress-bar bg-secondary" role="progressbar" style="width: 75.4464%;"></div>
                        </div>
                    </div>
                    <div class="time-display-total text-secondary"></div>
                </div>
            </div>
        </div>
        <div class="radio-controls">
            <button type="button" title="Play" aria-label="Play" class="btn p-0 radio-control-play-button btn-xl">
                <svg viewBox="0 0 24 24" class="icon" fill="currentColor" focusable="false" aria-hidden="true" width="1.2em" height="1.2em">
                    <path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10s10-4.48 10-10S17.52 2 12 2M9.5 16.5v-9l7 4.5z"></path>
                </svg>
            </button>
            <div class="radio-control-select-stream"><!---->

            </div>
            <div class="radio-control-volume d-flex align-items-center">
                <div class="flex-shrink-0 mx-2">
                    <button type="button" class="btn p-0 text-secondary" aria-label="Mute">
                        <svg viewBox="0 0 24 24" class="icon" fill="currentColor" focusable="false" aria-hidden="true" width="1.2em" height="1.2em">
                            <path fill="currentColor" d="M18.5 12A4.5 4.5 0 0 0 16 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02M5 9v6h4l5 5V4L9 9z"></path>
                        </svg>
                    </button>
                </div>
                <div class="flex-fill radio-control-volume-slider">
                    <input type="range" title="Volume" class="form-range" min="0" max="100" step="1">
                </div>
            </div>
        </div>
    </div>
    <div id="recentlyplayed">

    </div>

    <audio id="bgMusic">
        <source src="https://radio.nerdyjohnny.com:10000/radio.mp3">
    </audio>
    <script type="text/javascript" src="app.js"></script>
</body>
